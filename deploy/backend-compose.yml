services:
  po1market-backend:
    image: ghcr.io/${GHCR_OWNER}/${GHCR_REPOSITORY}-backend:${IMAGE_TAG}
    container_name: po1market-backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 5
